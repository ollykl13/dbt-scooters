version: 2

seeds:
  - name: "scooters"
    description: "Статистика и информация по моделям самокатов"
    config:
      delimiter: ","
  - name: "event_types"
    description: "Типы событий"
    config:
      delimiter: ","      
  - name: "age_groups"
    description: "Возрастные группы для группировки пользователей для анализа"
    columns:
      - name: "group"
        description: "Age group name for report"
        data_tests: [ "unique_not_null" ]
      - name: "age_start"
        description: "Start age of group"
        data_tests: [ "unique_not_null" ]
      - name: "age_end"
        description: "End age of group"
        data_tests: [ "unique_not_null" ]
    config:
      delimiter: ","  
  - name: "first_name_sex_manual"
    description: "Соответствие имени и пола пользователя (добавочный ручной справочник)"
    config:
      delimiter: ","                