version: 2

sources:
  - name: "scooters_raw"
    description: "Сырые данные из сервиса проката самокатов"
    loader: "https://t.me/inzhenerka_dbt_bot"
    tables:
      - name: "trips"
        description: "Поездки на самокатах"

      - name: "users"
        description: "Пользователи прокатного сервиса"

      - name: "events"
        description: "Сырые события пользователей с дубликатами"
models:
  - name: "trips_prep"
    description: "Поездки, подготовленные для анализа"
    config:
      materialized: "view"
  - name: "trips_stat"
    description: "Статистика по поездкам"
  - name: "trips_stat_daily"
    description: "Дневная статистика по поездкам"
    config:
      indexes:
        - columns: ['date']
  - name: "trips_age_daily"
    description: "Дневная статистика по поездкам по возрастам пользователей"
  - name: "trips_age_daily_stat"
    description: "Аггрегация дневной статистики поездок по возрастам пользователей"
  - name: "trips_geom"
    description: "Поездки, подготовленные для геометрического анализа"
    config:
      materialized: "view"
  - name: "parking_start_stat"
    description: "Статистика начала поездок в 500 м гексагонах"
  - name: "parking_finish_stat"
    description: "Статистика конца поездок в 500 м гексагонах"
  - name: "trips_users"
    description: "Подготовленные поездки, обогащенные данными пользователей"
    config:
      materialized: "incremental"      
  - name: "events_clean"
    description: "События пользователей с дубликатами"
    config:
      materialized: "incremental"  
  - name: "revenue_daily"
    description: "Суммарная дневная выручка"  
    config:
      materialized: "incremental"  
      incremental_strategy: "merge"
      unique_key: [ "date" ]  
      on_schema_change: "append_new_columns"
      full_refresh: false
  - name: "trips_concurrency"
    description: "Количество одновременных поездок"  
    config:
      materialized: "incremental"  
  - name: "companies"
    description: "Статистика по производителям самокатов"  
  - name: "companies_trips"
    description: "Статистика поездок по производителям самокатов"  
  - name: "events_full"
    description: "События пользователей обогащенные названиями типов событий"
    config:
      materialized: "view"
  - name: "events_stat"
    description: "Статистика отказов пользователей"
  - name: "trips_age_group"
    description: "Статистика поездок по группам пользователей"