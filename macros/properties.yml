version: 2

macros:
  - name: "updated_at"
    description: "Колонки, представляющие время последнего обновления"
  - name: "date_in_moscow"
    description: "Преобразует timestamptz в date в тайм-зоне Europe/Moscow"
    arguments:
      - name: "ts_col"
        type: "string"
        description: "Столбец Timestamp в формате timestamptz" 
  - name: "trips_geom_stat"
    description: "Количество поездок на гексагон указанного размера"
    arguments:
      - name: "trips_table"
        type: "string"
        description: "Таблица поездок с геометрическими данными"
      - name: "geom_col"
        type: "string"
        description: "Колонка с геометрическими данными"
      - name: "grid"
        type: "integer"
        description: "Размер сетки гексагона"
  - name: "create_role"
    description: "Создание роли для пользователей как операции dbt"
    arguments:
      - name: "name"
        type: "string"
        description: "Название роли"    
  - name: "create_postgis"
    description: "Активация расширения postgis"
  - name: "generate_schema_name"
    description: |
      Customize schema name generation using only provided name for some schemas.
      dbt uses this macro automatically, there is no need to run it manually.
    arguments:
      - name: "custom_schema_name"
        type: "string"
        description: "Custom name of schema defined in project configuration"
      - name: "node"
        type: "node"
        description: "dbt node to generate schema name for (not in use)"